name: Cardia UA pipeline

# Chạy HOURLY (phút 7 mỗi giờ — tránh phút 0 vì GitHub quá tải, cron trễ 5–15').
# Data settle theo GMT-7 nên phủ đủ mốc 14:00 VN.
# workflow_dispatch: cho phép bấm chạy tay ở tab Actions để test.
on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch: {}

# Không cho 2 lần chạy chồng nhau (tránh 2 deploy Cloudflare đua nhau).
concurrency:
  group: cardia-pipeline
  cancel-in-progress: false

# contents:write để push snapshot exports vào nhánh data
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Ép runner chạy giờ VN (mặc định runner là UTC) → "Last updated" + tên folder theo ngày đúng giờ VN.
    env:
      TZ: Asia/Ho_Chi_Minh
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Cài wrangler (để publish Cloudflare Pages)
        run: npm i -g wrangler@3

      # Dựng lại .env từ GitHub Secrets — scripts đọc .env nên KHÔNG cần sửa code.
      - name: Dựng .env từ secrets
        env:
          META_ACCESS_TOKEN:     ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID:    ${{ secrets.META_AD_ACCOUNT_ID }}
          ADJUST_API_TOKEN:      ${{ secrets.ADJUST_API_TOKEN }}
          ADJUST_REPORT_QUERY:   ${{ secrets.ADJUST_REPORT_QUERY }}
          ADJUST_CREATIVE_QUERY: ${{ secrets.ADJUST_CREATIVE_QUERY }}
          SINCE:                 ${{ secrets.SINCE }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT:      ${{ secrets.CF_PAGES_PROJECT }}
        run: |
          umask 077
          {
            echo "META_ACCESS_TOKEN=${META_ACCESS_TOKEN}"
            echo "META_AD_ACCOUNT_ID=${META_AD_ACCOUNT_ID}"
            echo "ADJUST_API_TOKEN=${ADJUST_API_TOKEN}"
            echo "ADJUST_REPORT_QUERY=${ADJUST_REPORT_QUERY}"
            echo "ADJUST_CREATIVE_QUERY=${ADJUST_CREATIVE_QUERY}"
            echo "SINCE=${SINCE}"
            echo "CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}"
            echo "CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}"
            echo "CF_PAGES_PROJECT=${CF_PAGES_PROJECT}"
          } > .env

      - name: Pull data (Meta + Adjust)
        run: python3 pull_data.py

      - name: Build dashboard.html
        run: python3 dashboard.py

      - name: Publish lên Cloudflare Pages
        run: bash publish_cloudflare.sh

      # Không cốt lõi cho live URL → best-effort, lỗi không làm fail run.
      - name: Analyze (best-effort)
        run: python3 analyze.py || true

      # ---- Snapshot exports → nhánh data (lịch sử "số nhìn thấy hôm X") ----
      # Chỉ commit 1 LẦN/NGÀY, ở run 22h/23h VN (data ngày đã gần đủ). Runner stateless nên
      # đây là nơi duy nhất giữ lại CSV; bonus: commit hằng ngày giữ repo active → GitHub
      # không bao giờ tự tắt scheduled workflow (rule 60 ngày không có commit).
      - uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: data
          path: _data

      - name: Snapshot exports → nhánh data (best-effort)
        continue-on-error: true
        run: |
          set -e
          DAY=$(date +%F); H=$(date +%H)
          if [ "$H" -lt 22 ]; then echo "⏭ chưa tới giờ snapshot (chỉ chạy run 22h/23h VN)"; exit 0; fi
          if [ -d "_data/snapshots/$DAY" ]; then echo "⏭ đã có snapshot $DAY"; exit 0; fi
          [ -d "exports/$DAY" ] || { echo "⏭ không có exports/$DAY"; exit 0; }
          mkdir -p _data/snapshots
          cp -r "exports/$DAY" "_data/snapshots/$DAY"
          cd _data
          git add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "snapshot $DAY (run $(date +%H:%M) VN)"
          git push origin data
          echo "✅ Đã lưu snapshot $DAY vào nhánh data"

      - name: Xoá .env
        if: always()
        run: rm -f .env
